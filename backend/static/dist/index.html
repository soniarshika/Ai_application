<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logistics Document AI</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .card {
        text-align: center;
        padding: 48px 64px;
        background: #1e293b;
        border-radius: 16px;
        border: 1px solid #334155;
      }
      .dot {
        display: inline-block;
        width: 12px;
        height: 12px;
        background: #22c55e;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      h1 {
        color: #f1f5f9;
        font-size: 1.75rem;
        font-weight: 600;
        margin-bottom: 12px;
      }
      p {
        color: #94a3b8;
        font-size: 0.95rem;
      }
      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        color: #22c55e;
        font-size: 0.875rem;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Logistics Document AI</h1>
      <p>Backend service is up and running.</p>
      <div class="status">
        <span class="dot"></span> Hosted
      </div>
    </div>
  </body>
</html>
